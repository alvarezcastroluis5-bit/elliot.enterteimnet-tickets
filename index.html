<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consulta de Tickets Elliot</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        linear-gradient(rgba(5, 8, 22, 0.82), rgba(15, 23, 42, 0.90)),
        url("fondo.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 480px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      text-align: center;
      backdrop-filter: blur(8px);
    }

    .logo-img {
      width: 140px;
      height: auto;
      margin-bottom: 15px;
      border-radius: 12px;
    }

    h1 {
      font-size: 26px;
      margin-bottom: 10px;
      color: #38bdf8;
    }

    p {
      color: #cbd5e1;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    input {
      width: 100%;
      padding: 15px;
      border-radius: 12px;
      border: none;
      outline: none;
      font-size: 16px;
      margin-bottom: 15px;
      text-align: center;
    }

    button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 12px;
      background: #38bdf8;
      color: #020617;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #0ea5e9;
    }

    .resultado {
      margin-top: 25px;
      text-align: left;
      display: none;
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 15px;
      padding: 18px;
      margin-top: 15px;
      border-left: 5px solid #38bdf8;
    }

    .card h2 {
      font-size: 20px;
      margin-bottom: 10px;
      color: #facc15;
    }

    .ticket {
      background: #020617;
      color: #38bdf8;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      text-align: center;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .error {
      background: rgba(239, 68, 68, 0.15);
      color: #fecaca;
      padding: 15px;
      border-radius: 12px;
      margin-top: 20px;
      display: none;
    }

    .cargando {
      color: #facc15;
      margin-top: 15px;
      display: none;
    }

    .footer {
      margin-top: 25px;
      font-size: 13px;
      color: #94a3b8;
    }
  </style>
</head>

<body>
  <div class="container">

    <img src="logo.jpg" class="logo-img" alt="Logo Elliot">

    <h1>Consulta tus Tickets</h1>

    <p>
      Ingresa tu código de cliente para verificar tus tickets asignados
      para el sorteo de Elliot.
    </p>

    <input type="text" id="codigoCliente" placeholder="Ejemplo: ELL001">

    <button onclick="buscarTickets()">Consultar mis tickets</button>

    <div class="cargando" id="cargando">
      Cargando datos...
    </div>

    <div class="error" id="error">
      No se encontraron tickets con ese código.
    </div>

    <div class="resultado" id="resultado"></div>

    <div class="footer">
      Elliot Entertainment © 2026 <br>
      Sorteo oficial con tickets digitales
    </div>
  </div>

  <script>
    const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR85QSA7AJ7JxtHvIr38POOMVvRlOPRu-if79NTx87eipTZQq2EejVKkwjormyU_S_b5MOXtBeubjE9/pub?gid=0&single=true&output=csv";

    let participantes = [];

    async function cargarDatos() {
      const cargando = document.getElementById("cargando");
      const error = document.getElementById("error");

      try {
        cargando.style.display = "block";

        const respuesta = await fetch(GOOGLE_SHEET_CSV_URL);
        const texto = await respuesta.text();

        const filas = texto.trim().split("\n").slice(1);

        participantes = filas.map(fila => {
          const columnas = fila.split(",");

          return {
            nombre: limpiarTexto(columnas[0]),
            codigo: limpiarTexto(columnas[1]),
            tickets: limpiarTexto(columnas[2]).split("|").map(t => t.trim()),
            estado: limpiarTexto(columnas[3])
          };
        });

        cargando.style.display = "none";
      } catch (e) {
        cargando.style.display = "none";
        error.innerText = "No se pudieron cargar los datos. Revisa el enlace de Google Sheets.";
        error.style.display = "block";
      }
    }

    function limpiarTexto(texto) {
      if (!texto) return "";
      return texto.replace(/"/g, "").trim();
    }

    function buscarTickets() {
      const codigoIngresado = document.getElementById("codigoCliente").value.trim();
      const resultado = document.getElementById("resultado");
      const error = document.getElementById("error");

      resultado.innerHTML = "";
      resultado.style.display = "none";
      error.style.display = "none";

      if (codigoIngresado === "") {
        error.innerText = "Por favor ingresa tu código de cliente.";
        error.style.display = "block";
        return;
      }

      const cliente = participantes.find(
        persona => persona.codigo.toLowerCase() === codigoIngresado.toLowerCase()
      );

      if (!cliente) {
        error.innerText = "No se encontraron tickets con ese código. Verifica que esté escrito correctamente.";
        error.style.display = "block";
        return;
      }

      let ticketsHTML = "";

      cliente.tickets.forEach(ticket => {
        ticketsHTML += `<div class="ticket">${ticket}</div>`;
      });

      resultado.innerHTML = `
        <div class="card">
          <h2>${cliente.nombre}</h2>
          <p><strong>Código de cliente:</strong> ${cliente.codigo}</p>
          <p><strong>Estado:</strong> ${cliente.estado}</p>
          <p><strong>Tickets asignados:</strong></p>
          ${ticketsHTML}
        </div>
      `;

      resultado.style.display = "block";
    }

    cargarDatos();
  </script>
</body>
</html>
